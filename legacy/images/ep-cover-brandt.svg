<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffcc00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc9900;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
    <filter id="noise">
      <feTurbulence baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues=".5 .2 .3 .8 .1 .7 .4 .6"/>
      </feComponentTransfer>
      <feComposite operator="multiply" in2="SourceGraphic"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGradient)"/>
  
  <!-- Noise Overlay -->
  <rect width="400" height="400" fill="#333" opacity="0.1" filter="url(#noise)"/>
  
  <!-- Geometric Background Pattern -->
  <g opacity="0.2">
    <line x1="0" y1="100" x2="400" y2="100" stroke="url(#redAccent)" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="url(#titleGradient)" stroke-width="2"/>
    <line x1="0" y1="300" x2="400" y2="300" stroke="url(#redAccent)" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="url(#redAccent)" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="url(#titleGradient)" stroke-width="2"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="url(#redAccent)" stroke-width="1"/>
  </g>
  
  <!-- Central Design Element -->
  <g transform="translate(200, 200)">
    <!-- Large Circle -->
    <circle r="120" fill="none" stroke="url(#redAccent)" stroke-width="3" opacity="0.6"/>
    <circle r="100" fill="none" stroke="url(#titleGradient)" stroke-width="2" opacity="0.4"/>
    <circle r="80" fill="none" stroke="url(#redAccent)" stroke-width="1" opacity="0.3"/>
    
    <!-- Central Star -->
    <polygon points="0,-30 8,-10 30,-10 14,4 20,24 0,12 -20,24 -14,4 -30,-10 -8,-10" 
             fill="url(#titleGradient)" 
             stroke="url(#redAccent)" 
             stroke-width="2" 
             filter="url(#textGlow)"/>
    
    <!-- Radiating Lines -->
    <g opacity="0.5">
      <line x1="0" y1="-120" x2="0" y2="-80" stroke="url(#titleGradient)" stroke-width="3"/>
      <line x1="85" y1="-85" x2="60" y2="-60" stroke="url(#titleGradient)" stroke-width="2"/>
      <line x1="120" y1="0" x2="80" y2="0" stroke="url(#titleGradient)" stroke-width="3"/>
      <line x1="85" y1="85" x2="60" y2="60" stroke="url(#titleGradient)" stroke-width="2"/>
      <line x1="0" y1="120" x2="0" y2="80" stroke="url(#titleGradient)" stroke-width="3"/>
      <line x1="-85" y1="85" x2="-60" y2="60" stroke="url(#titleGradient)" stroke-width="2"/>
      <line x1="-120" y1="0" x2="-80" y2="0" stroke="url(#titleGradient)" stroke-width="3"/>
      <line x1="-85" y1="-85" x2="-60" y2="-60" stroke="url(#titleGradient)" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Top Text -->
  <g font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">
    <!-- Artist Name -->
    <text x="200" y="60" font-size="24" fill="url(#redAccent)" filter="url(#textGlow)">FALCE e MACELLO</text>
    
    <!-- EP Title Line 1 -->
    <text x="200" y="340" font-size="18" fill="url(#titleGradient)" filter="url(#textGlow)">THE HOPEFUL CHILDREN</text>
    
    <!-- EP Title Line 2 -->
    <text x="200" y="365" font-size="18" fill="url(#titleGradient)" filter="url(#textGlow)">OF MR. BRANDT</text>
    
    <!-- Subtitle -->
    <text x="200" y="385" font-size="10" fill="#cccccc" opacity="0.8">PRIMO EP • 2024</text>
  </g>
  
  <!-- Corner Decorative Elements -->
  <g opacity="0.4">
    <!-- Top Left -->
    <polygon points="20,20 40,20 40,25 25,25 25,40 20,40" fill="url(#redAccent)"/>
    
    <!-- Top Right -->
    <polygon points="380,20 360,20 360,25 375,25 375,40 380,40" fill="url(#redAccent)"/>
    
    <!-- Bottom Left -->
    <polygon points="20,380 40,380 40,375 25,375 25,360 20,360" fill="url(#redAccent)"/>
    
    <!-- Bottom Right -->
    <polygon points="380,380 360,380 360,375 375,375 375,360 380,360" fill="url(#redAccent)"/>
  </g>
  
  <!-- Vinyl Record Grooves Effect -->
  <g opacity="0.1" transform="translate(200, 200)">
    <circle r="140" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle r="130" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle r="120" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle r="110" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle r="100" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle r="90" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle r="80" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle r="70" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle r="60" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle r="50" fill="none" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Border -->
  <rect width="400" height="400" fill="none" stroke="url(#redAccent)" stroke-width="4" rx="8"/>
  
  <!-- Glitch Effect Lines -->
  <g opacity="0.3">
    <rect x="0" y="150" width="400" height="2" fill="url(#titleGradient)"/>
    <rect x="0" y="250" width="400" height="1" fill="url(#redAccent)"/>
    <rect x="50" y="0" width="1" height="400" fill="url(#titleGradient)"/>
    <rect x="350" y="0" width="2" height="400" fill="url(#redAccent)"/>
  </g>
</svg>